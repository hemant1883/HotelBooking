spring:
  datasource:
    # Railway provides the full URL, Username, and Password automatically
    url: ${MYSQL_URL}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # Use a modern dialect for MySQL 8+
        dialect: org.hibernate.dialect.MySQL8Dialect

# Optional: Ensure the server port is set by Railway
server:
  port: ${PORT:8080}