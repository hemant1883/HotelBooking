spring:
  datasource:
    # Railway environment variables
    url: ${MYSQL_URL}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Automatically creates/updates tables based on your Java Entities
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # FIX: Using the generic MySQLDialect works for all versions 8+
        # and avoids the "Unable to resolve name" error.
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# Railway uses a dynamic port. This line is CRITICAL for the app to stay "Online"
server:
  port: ${PORT:8080}